<?xml version="1.0" encoding="UTF-8"?>
<svg width="780" height="620" viewBox="0 0 780 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="gradEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90caf9" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Edges -->
  <g stroke="url(#gradEdge)" stroke-width="3" stroke-linecap="round" opacity=".75">
    <path d="M130 180 Q210 120 310 210" />
    <path d="M310 210 Q390 300 500 260" />
    <path d="M500 260 Q600 230 660 320" />
    <path d="M310 210 Q400 140 520 160" />
    <path d="M520 160 Q610 190 660 320" />
    <path d="M130 180 Q240 290 310 420" />
    <path d="M310 420 Q430 430 500 260" />
    <path d="M310 420 Q430 500 660 320" />
  </g>

  <!-- Nodes -->
  <g filter="url(#soft)">
    <circle cx="130" cy="180" r="34" fill="url(#gradNode)"/>
    <circle cx="310" cy="210" r="32" fill="url(#gradNode)"/>
    <circle cx="520" cy="160" r="30" fill="url(#gradNode)"/>
    <circle cx="500" cy="260" r="36" fill="url(#gradNode)"/>
    <circle cx="660" cy="320" r="44" fill="url(#gradNode)"/>
    <circle cx="310" cy="420" r="28" fill="url(#gradNode)"/>
  </g>

  <!-- Labels -->
  <g font-family="system-ui" font-size="18" font-weight="600" fill="#ffffff">
    <text x="116" y="187">SRC</text>
    <text x="296" y="217">A</text>
    <text x="508" y="167">B</text>
    <text x="486" y="268">C</text>
    <text x="640" y="328">DST</text>
    <text x="300" y="427">D</text>
  </g>
</svg>